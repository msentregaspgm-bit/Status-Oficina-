<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Oficina - SV LOG</title>
    <style>
        :root {
            --sv-blue-dark: #000814;
            --sv-blue-mid: #001D3D;
            --sv-blue-light: #003566;
            --sv-yellow: #FFD60A;
            --sv-text: #E0E1DD;
            --whatsapp: #25D366;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--sv-blue-dark);
            color: var(--sv-text);
            margin: 0;
            padding: 10px;
        }

        .header {
            background: var(--sv-blue-mid);
            padding: 20px;
            border-radius: 12px;
            border-bottom: 4px solid var(--sv-yellow);
            text-align: center;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .header h1 {
            margin: 0;
            font-size: 18px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .action-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn-refresh { background: var(--sv-yellow); color: var(--sv-blue-dark); }
        .btn-zap-geral { background: var(--whatsapp); color: white; }

        .card-oficina {
            background: var(--sv-blue-mid);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(0,0,0,0.2);
            color: var(--sv-yellow);
            padding: 15px 10px;
            font-size: 10px;
            text-transform: uppercase;
            text-align: left;
        }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }

        .frota-txt { font-weight: 800; color: white; font-size: 16px; }
        .tipo-manutencao { color: #aaa; font-size: 11px; text-transform: uppercase; display: block; margin-top: 2px; }
        .previsao-txt { color: var(--sv-yellow); font-weight: 700; white-space: nowrap; }
        
        .status-pill {
            background: rgba(255, 214, 10, 0.1);
            color: var(--sv-yellow);
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 800;
            border: 1px solid var(--sv-yellow);
            display: inline-block;
        }

        .btn-zap-row {
            background: var(--whatsapp);
            color: white;
            padding: 6px 10px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 10px;
            font-weight: bold;
        }

        #loader { text-align: center; padding: 40px; color: var(--sv-yellow); font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>STATUS DE CAMINHÃO NA OFICINA</h1>
</div>

<div class="action-bar">
    <button class="btn btn-refresh" onclick="carregarOficina()">🔄 Atualizar</button>
    <a id="btnGeral" class="btn btn-zap-geral" target="_blank">📲 Status Geral</a>
</div>

<div id="loader">A carregar oficina...</div>

<div class="card-oficina" id="contentBox" style="display:none">
    <table>
        <thead>
            <tr>
                <th>Frota / Manutenção</th>
                <th>Previsão Saída</th>
                <th>Status Atual</th>
                <th>WhatsApp</th>
            </tr>
        </thead>
        <tbody id="listaOficina"></tbody>
    </table>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyQQg-Eu00DSw5X7AOOnIRYeNJDG3wZcSe4jqYIOILbZBixXhoESzQHFDIxDjt9qafA/exec";

    async function carregarOficina() {
        const loader = document.getElementById('loader');
        const contentBox = document.getElementById('contentBox');
        const lista = document.getElementById('listaOficina');
        const btnGeral = document.getElementById('btnGeral');
        
        loader.style.display = 'block';
        contentBox.style.display = 'none';

        try {
            const res = await fetch(URL_SCRIPT);
            const dados = await res.json();
            
            let html = "";
            let resumoGeral = "*INFORMATIVO OFICINA SV LOG*\n\n";

            dados.forEach(c => {
                const msgIndiv = encodeURIComponent(`*STATUS OFICINA SV LOG*\n\n🚛 *Frota:* ${c.frota}\n🛠️ *Manutenção:* ${c.tipo}\n📅 *Previsão:* ${c.previsao}\n📌 *Status:* ${c.status}`);
                
                resumoGeral += `🚛 *Frota: ${c.frota}*\n🛠️ Serv: ${c.tipo}\n📅 Saída: ${c.previsao}\n📌 Status: ${c.status}\n\n`;

                html += `
                    <tr>
                        <td>
                            <span class="frota-txt">${c.frota}</span>
                            <span class="tipo-manutencao">${c.tipo}</span>
                        </td>
                        <td class="previsao-txt">${c.previsao}</td>
                        <td><span class="status-pill">${c.status.toUpperCase()}</span></td>
                        <td>
                            <a href="https://wa.me/?text=${msgIndiv}" target="_blank" class="btn-zap-row">ENVIAR</a>
                        </td>
                    </tr>
                `;
            });

            lista.innerHTML = html;
            btnGeral.href = `https://wa.me/?text=${encodeURIComponent(resumoGeral)}`;
            
            loader.style.display = 'none';
            contentBox.style.display = 'block';
        } catch (e) {
            loader.innerText = "Erro ao carregar dados.";
        }
    }

    carregarOficina();
</script>

</body>
</html>
