<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV LOG - Status Oficina</title>
    <style>
        :root { --sv-blue-dark: #001D3D; --sv-blue-mid: #003566; --sv-yellow: #FFD60A; --sv-text: #E0E1DD; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--sv-blue-dark); color: var(--sv-text); margin: 0; padding: 10px; }
        .header { background: var(--sv-blue-mid); padding: 15px; border-bottom: 3px solid var(--sv-yellow); border-radius: 8px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .header h1 { margin: 0; font-size: 16px; text-transform: uppercase; }
        .table-card { background: var(--sv-blue-mid); border-radius: 12px; padding: 10px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { text-align: left; padding: 12px; color: var(--sv-yellow); font-size: 11px; text-transform: uppercase; border-bottom: 2px solid rgba(255,255,255,0.1); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        .status-badge { background: #ffd60a22; color: var(--sv-yellow); padding: 4px 8px; border-radius: 4px; font-weight: bold; border: 1px solid var(--sv-yellow); font-size: 11px; }
        .btn-zap { background: #25D366; color: white; border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 10px; text-decoration: none; display: inline-block; }
        .btn-refresh { background: var(--sv-yellow); color: var(--sv-blue-dark); border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Status Oficina SV LOG</h1>
        <button onclick="carregarOficina()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">🔄</button>
    </div>

    <div id="loader" style="text-align:center; padding:20px;">Carregando frota...</div>

    <div class="table-card" id="tableBox" style="display:none">
        <table>
            <thead>
                <tr>
                    <th>Frota</th>
                    <th>Manutenção</th>
                    <th>Previsão</th>
                    <th>Status Atual</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="listaOficina"></tbody>
        </table>
    </div>

    <script>
        const URL_SCRIPT_OFICINA = "https://script.google.com/macros/s/AKfycbzrMLIN9kheUd5f3msVg1sVjJglo4Fx9jk4OTluq21ClkjhvOHoi-_DQobdi1CtsFu4/exec";

        async function carregarOficina() {
            const loader = document.getElementById('loader');
            const tableBox = document.getElementById('tableBox');
            const lista = document.getElementById('listaOficina');

            try {
                const res = await fetch(URL_SCRIPT_OFICINA);
                const dados = await res.json();
                
                lista.innerHTML = "";
                dados.forEach(c => {
                    // Monta o link do WhatsApp
                    const msg = window.encodeURIComponent(`*INFORMATIVO OFICINA SV LOG*\n\n*Frota:* ${c.frota}\n*Serviço:* ${c.tipo}\n*Previsão:* ${c.previsao}\n*Status:* ${c.statusManual}`);
                    const linkZap = `https://wa.me/?text=${msg}`;

                    lista.innerHTML += `
                        <tr>
                            <td><b>${c.frota}</b></td>
                            <td>${c.tipo}</td>
                            <td style="color:var(--sv-yellow)">${c.previsao}</td>
                            <td><span class="status-badge">${c.statusManual.toUpperCase()}</span></td>
                            <td><a href="${linkZap}" target="_blank" class="btn-zap">ENVIAR WHATSAPP</a></td>
                        </tr>
                    `;
                });

                loader.style.display = 'none';
                tableBox.style.display = 'block';
            } catch (e) {
                loader.innerText = "Erro ao carregar dados.";
            }
        }

        carregarOficina();
    </script>
</body>
</html>
